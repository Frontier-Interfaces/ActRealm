<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ActRealm — Manage Agents and Bring Task Context Forward</title>
<meta name="description" content="ActRealm brings agent tasks, status, approval requests and workspaces into one local control layer, then returns you to the right terminal, diff and preview when action is needed.">
<style>
:root{
  --txt:#1d1d1f; --txt2:#6e6e73; --txt3:#86868b;
  --bg:#ffffff; --bg2:#f5f5f7; --line:#d2d2d7;
  --cyan:#0aa2b8; --violet:#6e5ae0; --amber:#ff9f0a; --amber-t:#b06000;
  --green:#34c759; --red:#ff453a; --blue:#0066cc;
  --grad:linear-gradient(100deg,#0aa2b8 10%,#6e5ae0 90%);
  --radius:28px;
  --shadow:0 12px 40px rgba(0,0,0,.10);
  --shadow-sm:0 4px 16px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro SC","PingFang SC","Source Han Sans SC","Microsoft YaHei",sans-serif;line-height:1.5;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;border:none;background:none;cursor:pointer;color:inherit}
.wrap{max-width:1024px;margin:0 auto;padding:0 24px}
.wrap-wide{max-width:1240px;margin:0 auto;padding:0 24px}
b{color:var(--txt)}
code{font-family:ui-monospace,Menlo,monospace;font-size:.92em;background:#ececf1;padding:2px 7px;border-radius:6px}

/* ---------- reveal ---------- */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .9s cubic-bezier(.2,.6,.2,1),transform .9s cubic-bezier(.2,.6,.2,1)}
.reveal.in{opacity:1;transform:none}
.d1{transition-delay:.08s}.d2{transition-delay:.16s}.d3{transition-delay:.24s}

/* ---------- local nav ---------- */
.lnav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(0,0,0,.08)}
.lnav-in{display:flex;align-items:center;justify-content:space-between;height:52px;gap:14px}
.lnav .name{display:flex;align-items:center;gap:8px;font-size:19px;font-weight:600}
.mark{width:22px;height:22px;border-radius:6px;background:var(--grad);position:relative;flex:none}
.mark::before{content:"";position:absolute;right:4px;top:5px;bottom:5px;width:9px;border-radius:2.5px;background:#fff}
.mark::after{content:"";position:absolute;left:4px;top:5px;width:4px;height:3px;border-radius:1px;background:#fff;box-shadow:0 4.5px 0 #fff,0 9px 0 #fff}
.lnav .links{display:flex;gap:24px;font-size:13px;color:var(--txt2)}
.lnav .links a:hover{color:var(--txt)}
.lnav .right{display:flex;align-items:center;gap:12px}
.pill-cta{background:var(--txt);color:#fff;font-size:12.5px;font-weight:500;padding:6px 16px;border-radius:980px;transition:.2s;white-space:nowrap}
.pill-cta:hover{transform:scale(1.04)}
.langseg{display:flex;background:var(--bg2);border-radius:980px;padding:2px}
.langseg button{font-size:11.5px;font-weight:600;padding:4px 11px;border-radius:980px;color:var(--txt2);transition:.2s;white-space:nowrap}
.langseg button.on{background:#fff;color:var(--txt);box-shadow:var(--shadow-sm)}

/* ---------- hero ---------- */
.hero{padding:88px 0 0;text-align:center}
.hero .appicon{width:88px;height:88px;border-radius:22px;background:var(--grad);margin:0 auto;position:relative;box-shadow:0 14px 34px rgba(110,90,224,.35)}
.hero .appicon::before{content:"";position:absolute;right:18px;top:22px;bottom:22px;width:34px;border-radius:8px;background:#fff;box-shadow:0 4px 14px rgba(0,0,0,.14)}
.hero .appicon::after{content:"";position:absolute;left:18px;top:22px;width:16px;height:12px;border-radius:4px;background:rgba(255,255,255,.92);box-shadow:0 16px 0 rgba(255,255,255,.66),0 32px 0 rgba(255,255,255,.4)}
.hero h1{font-size:28px;font-weight:600;margin-top:22px;letter-spacing:.5px}
.hero .cat{display:inline-block;margin-top:14px;padding:8px 20px;border-radius:980px;font-size:14.5px;font-weight:700;letter-spacing:.5px;border:1.5px solid rgba(110,90,224,.35);background:rgba(110,90,224,.06)}
.hero .cat span{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .slogan{font-size:clamp(42px,7.4vw,80px);font-weight:700;line-height:1.08;letter-spacing:-.02em;margin-top:10px}
.hero .slogan .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .sub{max-width:660px;margin:28px auto 0;font-size:19px;line-height:1.6;color:var(--txt2)}
.hero .badges{margin-top:20px;font-size:13px;color:var(--txt3);letter-spacing:.5px}
.cta-row{margin-top:30px;display:flex;gap:18px;justify-content:center;align-items:center;flex-wrap:wrap}
.btn{display:inline-block;border-radius:980px;font-size:15.5px;font-weight:500;padding:13px 28px;transition:.2s}
.btn-grad{background:var(--grad);color:#fff}
.btn-grad:hover{filter:brightness(1.08);transform:scale(1.02)}
.link-blue{color:var(--blue);font-size:15.5px}
.link-blue:hover{text-decoration:underline}

/* hero visual */
.hero-visual{margin:64px auto 0;max-width:1100px;padding:0 24px;transform-origin:50% 0}
.mac{background:linear-gradient(180deg,#fafafa,#f0f0f2);border:1px solid var(--line);border-radius:24px;padding:14px 14px 0;box-shadow:0 30px 80px rgba(0,0,0,.16)}
.screen{background:linear-gradient(160deg,#eef1f6,#e6e9f2);border-radius:14px 14px 0 0;padding:22px 22px 26px;position:relative;overflow:hidden}
.screen::before{content:"";position:absolute;inset:0;background:radial-gradient(700px 300px at 75% -10%,rgba(110,90,224,.10),transparent 60%),radial-gradient(600px 300px at 15% 0%,rgba(10,162,184,.10),transparent 60%)}
.spaces{display:flex;gap:10px;justify-content:center;position:relative}
.space-pill{font-size:12.5px;padding:7px 18px;border-radius:980px;background:#fff;color:var(--txt3);border:1px solid var(--line)}
.space-pill.on{color:var(--txt);border-color:rgba(10,162,184,.5);box-shadow:0 2px 10px rgba(10,162,184,.18);font-weight:600}
.space-pill.on .sdot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--cyan);margin-right:7px}
.ws-grid{display:grid;grid-template-columns:150px 1fr;gap:16px;margin-top:18px;position:relative}
.rail{display:flex;flex-direction:column;gap:10px}
.stagecard{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:11px;color:var(--txt2);text-align:left;box-shadow:var(--shadow-sm)}
.stagecard .row{display:flex;align-items:center;gap:6px;font-weight:600;color:var(--txt);font-size:11.5px}
.dot{width:7px;height:7px;border-radius:50%;flex:none}
.dot.c{background:var(--cyan)}.dot.a{background:var(--amber)}.dot.g{background:var(--green)}
.skel{height:5px;border-radius:3px;background:#ececf1;margin-top:7px}
.stagecard.hot{border-color:rgba(255,159,10,.55);box-shadow:0 4px 18px rgba(255,159,10,.22)}
@keyframes breathe{0%,100%{opacity:1}50%{opacity:.35}}
.led{animation:breathe 1.8s ease-in-out infinite}
.dashwin{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;text-align:left}
.titlebar{display:flex;align-items:center;gap:6px;padding:10px 14px;border-bottom:1px solid #ececf1}
.tl{width:10px;height:10px;border-radius:50%}
.tl.r{background:#ff5f57}.tl.y{background:#febc2e}.tl.g{background:#28c840}
.titlebar .t{margin-left:8px;font-size:11px;letter-spacing:1.5px;color:var(--txt3);font-weight:600}
.dashrows{padding:8px 14px 6px}
.drow{display:flex;align-items:center;gap:9px;padding:9px 2px;border-bottom:1px solid #f2f2f5;font-size:13px}
.drow:last-child{border-bottom:none}
.drow .nm{font-weight:600}
.drow .st{margin-left:auto;font-size:11.5px;color:var(--txt3)}
.chipbtn{font-size:11px;font-weight:600;color:var(--amber-t);background:rgba(255,159,10,.14);border:1px solid rgba(255,159,10,.4);padding:4px 10px;border-radius:980px;margin-left:auto;white-space:nowrap}
.consolebar{display:flex;gap:8px;padding:10px 14px;border-top:1px solid #ececf1;background:#fafafa}
.miniwin{flex:1;border:1px solid var(--line);border-radius:8px;padding:8px 0;text-align:center;font-size:10.5px;color:var(--txt3);background:#fff}
.hero-cap{margin-top:16px;text-align:center;font-size:13px;color:var(--txt3)}
.macbase{height:16px;background:linear-gradient(180deg,#e2e2e6,#c9c9cf);border-radius:0 0 18px 18px;margin:0 -14px;border-top:1px solid #d5d5da}

/* ---------- highlights gallery ---------- */
.highlights{padding:120px 0 40px}
.sec-head{font-size:clamp(30px,4.6vw,48px);font-weight:700;letter-spacing:-.02em}
.gallery-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px}
.arrows{display:flex;gap:10px}
.arrow{width:38px;height:38px;border-radius:50%;background:var(--bg2);font-size:17px;color:var(--txt2);transition:.2s;display:flex;align-items:center;justify-content:center}
.arrow:hover{background:#e8e8ed;color:var(--txt)}
.gallery{display:flex;gap:22px;overflow-x:auto;scroll-snap-type:x mandatory;padding:34px 24px 20px;margin:0 -24px;scrollbar-width:none}
.gallery::-webkit-scrollbar{display:none}
.gcard{flex:0 0 min(78vw,420px);scroll-snap-align:center;background:#0e0e12;color:#f5f5f7;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:transform .3s}
.gcard:hover{transform:translateY(-6px)}
.gcard .art{height:230px;position:relative;overflow:hidden}
.gcard .cap{padding:22px 24px 26px;font-size:17px;font-weight:600;line-height:1.45}
.gcard .cap small{display:block;margin-top:6px;font-size:13px;font-weight:400;color:#a1a1a6}
.art .glow{position:absolute;inset:0;background:radial-gradient(360px 200px at 70% 0%,rgba(110,90,224,.35),transparent 65%),radial-gradient(320px 200px at 20% 10%,rgba(10,162,184,.3),transparent 60%)}
.awin{position:absolute;background:#1c1c22;border:1px solid rgba(255,255,255,.14);border-radius:10px}
.awin .bar{height:8px;margin:8px;border-radius:4px;background:rgba(255,255,255,.14)}
.apill{position:absolute;font-size:11px;padding:6px 14px;border-radius:980px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#eee}
.adot{position:absolute;width:10px;height:10px;border-radius:50%}

/* ---------- chapters ---------- */
.chapter{padding:110px 0}
.chapter.alt{background:var(--bg2)}
.kicker{font-size:14px;font-weight:700;letter-spacing:3px;color:var(--txt3)}
.chapter h2{font-size:clamp(34px,5.2vw,58px);font-weight:700;line-height:1.12;letter-spacing:-.02em;margin-top:14px}
.chapter h2 .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.chapter .lead{max-width:660px;margin-top:22px;font-size:18px;line-height:1.65;color:var(--txt2)}
.demo-cap{margin-top:16px;font-size:13px;color:var(--txt3);text-align:center}

/* tiles */
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:44px}
.tile{background:#fff;border-radius:20px;padding:26px 24px;box-shadow:var(--shadow-sm);font-size:14.5px;color:var(--txt2);line-height:1.6}
.tile b{display:block;font-size:16.5px;margin-bottom:6px}
.chapter:not(.alt) .tile{background:var(--bg2);box-shadow:none}

/* ---------- ch1 desktop demo ---------- */
.dt-demo{margin-top:48px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:26px;overflow:hidden}
.dt-pills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.dt-pill{font-size:13.5px;padding:9px 22px;border-radius:980px;background:#f0f0f3;color:var(--txt2);border:1px solid transparent;transition:.25s}
.dt-pill.on{background:#fff;color:var(--txt);font-weight:600;border-color:rgba(10,162,184,.45);box-shadow:0 2px 12px rgba(10,162,184,.16)}
.dt-view{margin-top:20px;border-radius:18px;overflow:hidden;border:1px solid var(--line);background:linear-gradient(160deg,#eef1f6,#e8ebf3)}
.dt-track{display:flex;width:200%;transition:transform .65s cubic-bezier(.3,.7,.2,1)}
.dt-scene{width:50%;flex:none;padding:26px;min-height:300px;position:relative}
.docwin{max-width:420px;margin:22px auto 0;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-sm);padding-bottom:16px}
.docwin .lines{padding:14px 18px 0}
.docwin .ln{height:8px;border-radius:4px;background:#ececf1;margin-bottom:10px}
.scene-tag{text-align:center;font-size:12.5px;color:var(--txt3);margin-top:18px}
.ai-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;max-width:640px;margin:0 auto}
.ai-side{display:flex;flex-direction:column;gap:10px}
.sidewin{flex:1;background:#fff;border:1px solid var(--line);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--txt3);box-shadow:var(--shadow-sm);min-height:52px}
.sidewin i{font-style:normal;font-weight:600}
.kbd{display:inline-block;font-size:12px;border:1px solid var(--line);border-bottom-width:2px;border-radius:6px;padding:1px 7px;background:#fff;color:var(--txt2);font-family:ui-monospace,Menlo,monospace}

/* ---------- ch2 stage demo ---------- */
.st-demo{margin-top:48px;display:grid;grid-template-columns:260px 1fr;gap:20px;align-items:stretch}
.st-rail{display:flex;flex-direction:column;gap:12px}
.taskbtn{text-align:left;background:var(--bg2);border-radius:16px;padding:16px 18px;border:1.5px solid transparent;transition:.25s;font-size:13px;color:var(--txt2)}
.taskbtn .nm{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--txt)}
.taskbtn .meta{display:block;margin-top:5px;font-size:12.5px}
.taskbtn:hover{background:#eeeef2}
.taskbtn.on{background:#fff;border-color:rgba(10,162,184,.55);box-shadow:0 6px 24px rgba(10,162,184,.14)}
.taskbtn.wait.on{border-color:rgba(255,159,10,.6);box-shadow:0 6px 24px rgba(255,159,10,.18)}
.st-stage{background:var(--bg2);border-radius:var(--radius);padding:24px;position:relative;overflow:hidden;min-height:340px}
.st-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.st-head .ttl{font-size:17px;font-weight:700}
.st-head .st{font-size:13px;color:var(--txt3)}
.st-windows{display:grid;grid-template-columns:1.4fr 1fr;gap:12px;margin-top:16px}
.bigwin{grid-row:span 2;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-sm);overflow:hidden;display:flex;flex-direction:column}
.bigwin .body{flex:1;padding:12px 14px;font-family:ui-monospace,Menlo,monospace;font-size:11px;color:var(--txt2);line-height:1.9}
.smallwin{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-sm);min-height:120px;display:flex;flex-direction:column}
.smallwin .body{flex:1;display:flex;align-items:center;justify-content:center;font-size:12.5px;color:var(--txt3);padding:10px;text-align:center;line-height:1.7}
.swap{animation:swapin .45s cubic-bezier(.2,.7,.2,1)}
@keyframes swapin{0%{opacity:0;transform:scale(.965) translateY(10px)}100%{opacity:1;transform:none}}
.st-mode{margin-top:22px;display:flex;justify-content:center;align-items:center;gap:14px;font-size:13.5px;color:var(--txt2);flex-wrap:wrap}
.seg{display:flex;background:var(--bg2);border-radius:980px;padding:3px}
.seg button{font-size:13px;padding:7px 18px;border-radius:980px;color:var(--txt2);transition:.2s}
.seg button.on{background:#fff;color:var(--txt);font-weight:600;box-shadow:var(--shadow-sm)}

/* ---------- ch3 notify ---------- */
.chapter.gradbg{background:
  radial-gradient(900px 420px at 80% 0%,rgba(110,90,224,.12),transparent 60%),
  radial-gradient(800px 400px at 10% 20%,rgba(10,162,184,.10),transparent 60%),var(--bg2)}
.nf-demo{margin-top:48px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:30px;position:relative;overflow:hidden;min-height:330px}
.nf-btnrow{text-align:center;margin-top:26px}
.notif{position:absolute;top:26px;right:26px;width:min(400px,86%);background:rgba(250,250,252,.92);backdrop-filter:blur(14px);border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.18);padding:18px 20px;opacity:0;transform:translateY(-16px) scale(.97);pointer-events:none;transition:.45s cubic-bezier(.2,.7,.2,1);z-index:5}
.notif.show{opacity:1;transform:none;pointer-events:auto}
.notif .hd{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700}
.notif .bd{margin-top:8px;font-size:13px;color:var(--txt2);line-height:1.65}
.notif .acts{margin-top:14px;display:flex;gap:10px}
.nbtn{font-size:12.5px;font-weight:600;padding:7px 16px;border-radius:980px;transition:.2s}
.nbtn.ok{background:var(--txt);color:#fff}
.nbtn.ok:hover{transform:scale(1.04)}
.nbtn.ghost{background:var(--bg2);color:var(--txt)}
.ladder{max-width:600px;margin:0 auto}
.lrow{display:grid;grid-template-columns:110px 1fr 190px;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid #ececf1;font-size:14px}
.lrow:last-child{border-bottom:none}
.lrow .lv{color:var(--txt3);font-size:13px}
.lbar{height:10px;border-radius:5px}
.lrow .how{color:var(--txt2);font-size:13px;text-align:right}

/* ---------- ch4 report ---------- */
.rp-demo{margin-top:48px;display:grid;grid-template-columns:1.25fr 1fr;gap:22px;align-items:start}
.rp-card,.rp-side{background:var(--bg2);border-radius:var(--radius);padding:28px}
.rp-card h4,.rp-side h4{font-size:13px;letter-spacing:2px;color:var(--txt3);font-weight:700}
.rp-card .ttl{font-size:19px;font-weight:700;margin-top:8px}
.rp-sec{margin-top:18px;font-size:14px;line-height:1.7;color:var(--txt2)}
.rp-sec b{font-size:14.5px}
.rp-doubt{margin-top:18px;background:rgba(255,159,10,.1);border:1px solid rgba(255,159,10,.35);border-radius:14px;padding:14px 16px;font-size:13.5px;color:var(--amber-t);line-height:1.65}
.rp-doubt b{color:var(--amber-t)}
.rp-verdict{margin-top:12px;background:rgba(10,162,184,.08);border:1px solid rgba(10,162,184,.35);border-radius:14px;padding:14px 16px;font-size:13.5px;color:#07697a;line-height:1.65}
.rp-verdict b{color:#07697a}
.rp-acts{margin-top:20px;display:flex;gap:10px;flex-wrap:wrap}
.timeline{margin-top:18px;position:relative;padding-left:4px}
.tstep{display:flex;gap:14px;padding:0 0 26px;position:relative}
.tstep::before{content:"";position:absolute;left:9px;top:22px;bottom:0;width:2px;background:#e2e2e7}
.tstep:last-child{padding-bottom:6px}
.tstep:last-child::before{display:none}
.tdot{width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid #cfcfd6;flex:none;position:relative;z-index:1;transition:.25s}
.tstep.done .tdot{border-color:var(--green);background:var(--green);box-shadow:0 0 0 4px rgba(52,199,89,.15)}
.tstep.cur .tdot{border-color:var(--cyan);background:#fff;box-shadow:0 0 0 4px rgba(10,162,184,.18)}
.tstep .tt{font-size:14px;font-weight:600;line-height:20px}
.tstep .ts{font-size:12px;color:var(--txt3);margin-top:2px}
.tstep.rolled{opacity:.32;filter:saturate(0)}
.rollbtn{margin-top:14px;width:100%;text-align:center;font-size:13.5px;font-weight:600;color:var(--red);background:rgba(255,69,58,.08);border:1px solid rgba(255,69,58,.3);padding:11px;border-radius:14px;transition:.2s}
.rollbtn:hover{background:rgba(255,69,58,.14)}

/* ---------- photo bands (real scenes) ---------- */
.photo-band{position:relative;height:min(74vh,620px);overflow:hidden;background:#101014}
.photo-band img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.photo-band .shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05) 30%,rgba(0,0,0,.62) 100%)}
.photo-band .txt{position:absolute;left:0;right:0;bottom:0;padding:0 24px 54px;color:#fff;text-align:center}
.photo-band .txt .pk{font-size:13px;font-weight:700;letter-spacing:3px;opacity:.8}
.photo-band .txt .pl{margin-top:10px;font-size:clamp(26px,4.6vw,44px);font-weight:700;letter-spacing:-.01em;text-shadow:0 2px 24px rgba(0,0,0,.45)}
.photo-band .txt .ps{margin-top:10px;font-size:15px;opacity:.85}
.photo-band .credit{position:absolute;right:14px;bottom:12px;font-size:10.5px;color:rgba(255,255,255,.55);z-index:2}

/* ---------- stats band ---------- */
.band{position:relative;background:#101014;color:#f5f5f7;padding:110px 0;text-align:center;overflow:hidden}
.band .bgimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.34;filter:saturate(.85)}
.band .bgshade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(12,12,16,.82),rgba(12,12,16,.9))}
.band .wrap{position:relative;z-index:1}
.band .g{background:linear-gradient(100deg,#3ed3e4,#9b8cff);-webkit-background-clip:text;background-clip:text;color:transparent}
.band .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:64px}
.band .num{font-size:clamp(44px,6vw,68px);font-weight:700;background:linear-gradient(100deg,#3ed3e4,#9b8cff);-webkit-background-clip:text;background-clip:text;color:transparent}
.band .lbl{margin:10px auto 0;max-width:280px;font-size:14.5px;color:#a1a1a6;line-height:1.6}
.band .src{margin-top:54px;font-size:12px;color:#6e6e73}

/* ---------- compat ---------- */
.compat{padding:120px 0;text-align:center}
.chips{margin-top:44px;display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.chip{padding:13px 28px;border-radius:980px;background:var(--bg2);font-size:15px;font-weight:600;transition:.2s}
.chip:hover{transform:translateY(-3px);box-shadow:var(--shadow-sm)}
.chip.soon{color:var(--txt3);font-weight:400;background:#fff;border:1px dashed var(--line)}
.compat .note{margin-top:28px;font-size:13px;color:var(--txt3)}

/* ---------- faq ---------- */
.faq{background:var(--bg2);padding:110px 0}
.faq-list{margin-top:44px;border-top:1px solid var(--line)}
.qa{border-bottom:1px solid var(--line)}
.qa .q{width:100%;display:flex;justify-content:space-between;align-items:center;gap:20px;text-align:left;padding:24px 4px;font-size:18px;font-weight:600}
.qa .q .ic{font-size:22px;color:var(--txt3);transition:transform .35s;flex:none}
.qa.open .q .ic{transform:rotate(45deg)}
.qa .a{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.3,.7,.2,1)}
.qa .a p{padding:0 4px 26px;max-width:760px;font-size:15.5px;line-height:1.7;color:var(--txt2)}

/* ---------- cta ---------- */
.cta{padding:130px 0;text-align:center;background:
  radial-gradient(700px 340px at 30% 0%,rgba(10,162,184,.10),transparent 60%),
  radial-gradient(700px 340px at 75% 100%,rgba(110,90,224,.12),transparent 60%)}
.cta .sec-head{font-size:clamp(34px,5.2vw,56px)}
.cta .lead{max-width:600px;margin:20px auto 0;font-size:17.5px;color:var(--txt2);line-height:1.65}
.mono{margin-top:26px;font-family:ui-monospace,Menlo,monospace;font-size:13.5px;color:var(--txt3)}
.gtxt{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}

/* ---------- agent presence ---------- */
.duty{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--txt3);border:1px solid var(--line);border-radius:980px;padding:3px 11px;white-space:nowrap}
.ddot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:breathe 1.8s ease-in-out infinite;flex:none}
.feed{max-width:640px;margin:30px auto 0;background:#0e0e12;border-radius:16px;padding:16px 20px 14px;text-align:left;box-shadow:var(--shadow)}
.feed-head{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:2px;color:#9a9aa2;font-weight:700}
.feed-body{margin-top:10px;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;line-height:2.1;color:#c7ccd6;min-height:164px}
.fl:last-child::after{content:"▍";color:#3ed3e4;animation:breathe 1s infinite}

/* ---------- division of labor loop ---------- */
.loop{padding:100px 0 120px}
.loop .lead{max-width:640px;margin-top:20px;font-size:18px;line-height:1.65;color:var(--txt2)}
.loop-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:26px;margin-top:48px}
.lcard{background:var(--bg2);border-radius:20px;padding:24px 22px;font-size:13.5px;color:var(--txt2);line-height:1.65;position:relative}
.lcard .ln{display:block;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--txt3);margin-bottom:10px}
.lcard b{display:block;font-size:16.5px;margin-bottom:6px;color:var(--txt)}
.lcard:not(:last-child)::after{content:"→";position:absolute;right:-21px;top:50%;transform:translateY(-50%);color:#b8b8bf;font-size:17px}

/* ---------- manifesto ---------- */
.manifesto{background:#0b0b0f;color:#f5f5f7;padding:130px 0;text-align:center}
.manifesto .mani{max-width:840px;margin:0 auto;font-size:clamp(21px,3vw,32px);font-weight:600;line-height:1.7;letter-spacing:-.01em}
.manifesto .mani .g{background:linear-gradient(100deg,#3ed3e4,#9b8cff);-webkit-background-clip:text;background-clip:text;color:transparent}
.mani-sign{margin-top:30px;font-size:14px;color:#6e6e73}

/* ---------- footer ---------- */
footer{border-top:1px solid var(--line);padding:32px 0 44px;font-size:12.5px;color:var(--txt3)}
.foot-in{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap}
.footnote{margin-top:14px;font-size:11.5px;line-height:1.7}

/* ---------- toast ---------- */
#toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(20px);background:rgba(29,29,31,.92);color:#fff;font-size:13.5px;padding:11px 22px;border-radius:980px;opacity:0;pointer-events:none;transition:.4s cubic-bezier(.2,.7,.2,1);z-index:200;box-shadow:0 10px 30px rgba(0,0,0,.25);max-width:86vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%)}

/* ---------- roadmap badges ---------- */
.rmk{display:inline-block;margin-left:10px;font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--amber-t);background:rgba(255,159,10,.14);border:1px solid rgba(255,159,10,.4);padding:3px 10px;border-radius:980px;vertical-align:2px}
.demo-badge{position:absolute;top:14px;right:16px;font-size:10.5px;font-weight:700;letter-spacing:1px;color:var(--txt3);background:#fff;border:1px dashed var(--line);padding:3px 10px;border-radius:980px}
.rp-card{position:relative}

/* ---------- shipping-today outbox demo ---------- */
.ob-demo{margin-top:48px;max-width:720px}
.ob-card{background:#fff;border:1.5px solid rgba(255,159,10,.45);border-radius:20px;padding:22px 24px;box-shadow:0 10px 36px rgba(255,159,10,.12)}
.ob-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.obb{font-size:11px;font-weight:700;padding:3px 10px;border-radius:980px}
.obb.amber{color:var(--amber-t);background:rgba(255,159,10,.14);border:1px solid rgba(255,159,10,.4)}
.obb.red{color:#c53229;background:rgba(255,69,58,.1);border:1px solid rgba(255,69,58,.35)}
.ob-wait{margin-left:auto;font-size:11.5px;color:var(--txt3)}
.ob-title{margin-top:12px;font-size:18px;font-weight:700}
.ob-src{margin-top:6px;font-size:12.5px;color:var(--txt3)}
.ob-cmd{margin-top:14px;display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-family:ui-monospace,Menlo,monospace;font-size:13px}
.ob-tool{font-size:11px;font-weight:700;background:#fff;border:1px solid var(--line);padding:2px 8px;border-radius:6px}
.ob-risk{margin-top:10px;font-size:12.5px;color:var(--amber-t)}
.ob-acts{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap}
.undo-pill{margin-top:14px;display:flex;align-items:center;gap:12px;background:rgba(52,199,89,.1);border:1px solid rgba(52,199,89,.35);border-radius:980px;padding:10px 14px}
.undo-ring{width:34px;height:34px;border-radius:50%;background:conic-gradient(#1e9e46 100%,#dfe7df 0);display:flex;align-items:center;justify-content:center;flex:none}
.undo-ring i{font-style:normal;width:26px;height:26px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#1e9e46}
.undo-txt{font-size:13px;color:#1e6f3d;flex:1;line-height:1.5}
[hidden]{display:none!important}

@media(max-width:860px){
  .lnav .links{display:none}
  .loop-grid{grid-template-columns:1fr}
  .lcard:not(:last-child)::after{content:"↓";right:auto;left:50%;top:auto;bottom:-24px;transform:translateX(-50%)}
  .ws-grid{grid-template-columns:1fr}
  .rail{flex-direction:row}
  .rail .stagecard{flex:1}
  .tiles{grid-template-columns:1fr}
  .st-demo{grid-template-columns:1fr}
  .st-rail{flex-direction:row;overflow-x:auto;padding-bottom:4px}
  .st-rail .taskbtn{flex:1 0 200px}
  .rp-demo{grid-template-columns:1fr}
  .band .grid{grid-template-columns:1fr}
  .lrow{grid-template-columns:90px 1fr}
  .lrow .how{grid-column:1/3;text-align:left}
  .ai-grid{grid-template-columns:1fr}
}
</style>
</head>
