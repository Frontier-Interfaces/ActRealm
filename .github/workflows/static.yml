document.getElementById("ctaGit").addEventListener("click",e=>{e.preventDefault();toast(I18N[cur].toasts.git);});
document.getElementById("ctaCom").addEventListener("click",e=>{e.preventDefault();toast(I18N[cur].toasts.com);});

