let cur="en";
let activeTask="a";
let rolled=false;

function t(k){return I18N[cur][k]||"";}

function applyLang(l){
  cur=l;
  document.documentElement.lang=(l==="zh"?"zh-CN":"en");
  document.title=I18N[l]._title;
  document.querySelectorAll("[data-i]").forEach(el=>{
    const v=I18N[l][el.dataset.i];
    if(v!==undefined)el.innerHTML=v;
  });
  document.querySelectorAll("#langSeg button").forEach(b=>b.classList.toggle("on",b.dataset.l===l));
  document.getElementById("ctaGit").textContent=t("cta.git").replace("&amp;","&");
  document.getElementById("ctaCom").textContent=t("cta.com");
  document.getElementById("rollBtn").textContent=t(rolled?"roll.undo":"roll.do");
  renderTask(activeTask,false);
  document.querySelectorAll(".qa.open .a").forEach(a=>a.style.maxHeight=a.scrollHeight+"px");
  startFeed();
  if(typeof obReset==="function")obReset();
}

/* ================= live activity feed ================= */
let feedTimer=null;
function startFeed(){
  const body=document.getElementById("feedBody");
  clearTimeout(feedTimer);body.innerHTML="";
  const lines=I18N[cur].feedLines;
  let li=0,ci=0,curEl=null;
  function step(){
    if(li>=lines.length){
      feedTimer=setTimeout(()=>{body.innerHTML="";li=0;ci=0;curEl=null;feedTimer=setTimeout(step,400);},3400);
      return;
    }
    if(!curEl){
      curEl=document.createElement("div");curEl.className="fl";
      if(lines[li].includes("→"))curEl.style.color="#ffb454";
      body.appendChild(curEl);
    }
    ci++;curEl.textContent=lines[li].slice(0,ci);
    if(ci>=lines[li].length){li++;ci=0;curEl=null;feedTimer=setTimeout(step,430);}
    else feedTimer=setTimeout(step,13);
  }
  step();
}

/* ================= toast ================= */
let toastTimer=null;
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove("show"),2200);
}

/* ================= reveal ================= */
const io=new IntersectionObserver(es=>{
  es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}});
},{threshold:.15});
document.querySelectorAll(".reveal").forEach(el=>io.observe(el));

/* ================= hero scale ================= */
const hv=document.getElementById("heroVisual");
addEventListener("scroll",()=>{
  const s=Math.max(1,1.045-scrollY/2600);
  hv.style.transform=`scale(${s.toFixed(4)})`;
},{passive:true});

/* ================= gallery ================= */
const gal=document.getElementById("gallery");
const step=()=>Math.min(gal.clientWidth*.8,444);
document.getElementById("galL").onclick=()=>gal.scrollBy({left:-step(),behavior:"smooth"});
document.getElementById("galR").onclick=()=>gal.scrollBy({left:step(),behavior:"smooth"});

/* ================= ch1 desktop switcher ================= */
const dtTrack=document.getElementById("dtTrack");
document.querySelectorAll(".dt-pill").forEach(p=>{
  p.addEventListener("click",()=>{
    document.querySelectorAll(".dt-pill").forEach(x=>x.classList.remove("on"));
    p.classList.add("on");
    dtTrack.style.transform=p.dataset.d==="1"?"translateX(-50%)":"translateX(0)";
  });
});

/* ================= ch2 stage demo ================= */
const stContent=document.getElementById("stContent");
function renderTask(k,animate=true){
  const task=I18N[cur].tasks[k];
  document.getElementById("stTitle").textContent=task.title;
  document.getElementById("stStatus").textContent=task.status;
  document.getElementById("stTerm").innerHTML=task.term;
  document.getElementById("stDiff").textContent=task.diff;
  document.getElementById("stPrev").textContent=task.prev;
  if(animate){stContent.classList.remove("swap");void stContent.offsetWidth;stContent.classList.add("swap");}
  document.querySelectorAll(".taskbtn").forEach(b=>b.classList.toggle("on",b.dataset.t===k));
}
function showTask(k){activeTask=k;renderTask(k,true);}
document.querySelectorAll(".taskbtn").forEach(b=>b.addEventListener("click",()=>showTask(b.dataset.t)));

/* ================= shipping-today outbox demo ================= */
let obTick=null,obTimer=null,obArmed=false;
function obReset(){
  clearInterval(obTick);clearTimeout(obTimer);obArmed=false;
  const card=document.getElementById("obCard"),pill=document.getElementById("undoPill");
  if(!card)return;
  card.hidden=false;pill.hidden=true;
  document.getElementById("obAllow").textContent=t("now.a3");
  document.getElementById("undoBtn").hidden=false;
  document.getElementById("undoNum").textContent="3";
  document.getElementById("undoRing").style.background="conic-gradient(#1e9e46 100%,#dfe7df 0)";
  document.getElementById("undoTxt").innerHTML=t("now.u1");
}
(function(){
  const card=document.getElementById("obCard");if(!card)return;
  const pill=document.getElementById("undoPill"),allow=document.getElementById("obAllow"),
        ring=document.getElementById("undoRing"),num=document.getElementById("undoNum"),
        txt=document.getElementById("undoTxt"),undoBtn=document.getElementById("undoBtn");
  document.getElementById("obCheck").addEventListener("click",()=>toast(I18N[cur].toasts.obCheck));
  document.getElementById("obDeny").addEventListener("click",()=>toast(I18N[cur].toasts.obDeny));
  allow.addEventListener("click",()=>{
    if(!obArmed){obArmed=true;allow.textContent=t("now.a3c");return;}
    card.hidden=true;pill.hidden=false;undoBtn.hidden=false;
    txt.innerHTML=t("now.u1");toast(I18N[cur].toasts.obSent);
    let s=3;num.textContent=s;ring.style.background="conic-gradient(#1e9e46 100%,#dfe7df 0)";
    clearInterval(obTick);
    obTick=setInterval(()=>{
      s--;
      if(s<=0){
        clearInterval(obTick);num.textContent="✓";
        ring.style.background="conic-gradient(#1e9e46 100%,#dfe7df 0)";
        txt.innerHTML=t("now.u3");undoBtn.hidden=true;
        toast(I18N[cur].toasts.obDone);
        obTimer=setTimeout(obReset,2600);
      }else{
        num.textContent=s;
        ring.style.background=`conic-gradient(#1e9e46 ${(s/3*100).toFixed(0)}%,#dfe7df 0)`;
      }
    },1000);
  });
  undoBtn.addEventListener("click",()=>{toast(I18N[cur].toasts.obUndo);obReset();});
})();

/* ================= ch3 notification demo ================= */
const notif=document.getElementById("notif");
document.getElementById("nfTrigger").addEventListener("click",()=>notif.classList.add("show"));
document.getElementById("nfOk").addEventListener("click",()=>{notif.classList.remove("show");toast(I18N[cur].toasts.okA);});
document.getElementById("nfGo").addEventListener("click",()=>{notif.classList.remove("show");toast(I18N[cur].toasts.goStage);});

/* ================= ch4 report demo ================= */
document.getElementById("rpDiff").addEventListener("click",()=>toast(I18N[cur].toasts.diff));
document.getElementById("rpPass").addEventListener("click",()=>toast(I18N[cur].toasts.pass));
document.getElementById("rollBtn").addEventListener("click",function(){
  const steps=[...document.querySelectorAll("#tline .tstep")];
  if(!rolled){
    steps[3].classList.add("rolled");steps[3].classList.remove("cur");
    steps[2].classList.add("cur");
    toast(I18N[cur].toasts.rolled);
  }else{
    steps[3].classList.remove("rolled");steps[3].classList.add("cur");
    steps[2].classList.remove("cur");
    toast(I18N[cur].toasts.restored);
  }
  rolled=!rolled;
  this.textContent=t(rolled?"roll.undo":"roll.do");
});

/* ================= stats count-up ================= */
const nio=new IntersectionObserver(es=>{
  es.forEach(e=>{
    if(!e.isIntersecting)return;
    const el=e.target,target=+el.dataset.n,suf=el.dataset.suf||"";
    const t0=performance.now();
    (function tick(ts){
      const p=Math.min(1,(ts-t0)/1200),ease=1-Math.pow(1-p,3);
      el.textContent=Math.round(target*ease)+suf;
      if(p<1)requestAnimationFrame(tick);
    })(t0);
    nio.unobserve(el);
  });
},{threshold:.6});
document.querySelectorAll(".num[data-n]").forEach(el=>nio.observe(el));

/* ================= faq accordion ================= */
document.querySelectorAll(".qa").forEach(qa=>{
  const q=qa.querySelector(".q"),a=qa.querySelector(".a");
  q.addEventListener("click",()=>{
    const open=qa.classList.contains("open");
    document.querySelectorAll(".qa.open").forEach(o=>{o.classList.remove("open");o.querySelector(".a").style.maxHeight="0px";});
    if(!open){qa.classList.add("open");a.style.maxHeight=a.scrollHeight+"px";}
  });
});

